# Run Playwright E2E tests on push/PR to main/master
# Uses production build + start; CI=1 enables 1 worker and no built-in webServer

name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://waypoint-labs.pages.dev
          NEXT_PUBLIC_API_URL: https://civilian-drone-app.fly.dev
          NEXT_PUBLIC_WS_URL: wss://civilian-drone-app.fly.dev

      - name: Start server
        run: |
          npm run start &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:3000 >/dev/null && break; sleep 2; done

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: '1'
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
